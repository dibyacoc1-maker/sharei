<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FileDrop — P2P File Transfer</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="10" stroke="currentColor" stroke-width="1.5"/>
        <path d="M6 11 Q11 5 16 11 Q11 17 6 11Z" fill="currentColor" opacity="0.15"/>
        <circle cx="11" cy="11" r="3" fill="currentColor"/>
        <path d="M4 8a9 9 0 0114 0" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M2 11a11 11 0 0118 0" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <span>FileDrop</span>
    </div>
    <section class="header-right">
      <p class="my-id-label">Your ID:</p> 
      <span class="my-id-label">
        <code id="my-peer-id">—</code>
      </span>
    </section>
  </header>

  <main>
    <div class="radar-area">
      <div class="radar-rings">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
      </div>
      <div class="radar-pulse"></div>

      <!-- You node always in center -->
      <div class="node you" id="you-node">
        <div class="avatar you-avatar">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" fill="currentColor"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
          <span>You</span>
        </div>
      </div>

      <!-- Peers get injected here by JS -->
      <div id="peers-container"></div>
    </div>

    <!-- State messages -->
    <div id="status-msg" class="status-msg">
      Waiting for peers on your network…
    </div>
  </main>

  <!-- Send file modal -->
  <div id="send-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-peer-name" id="modal-peer-name">Peer</div>
      <p class="modal-hint">Choose a file to send</p>
      <label class="file-pick-label" id="file-pick-label">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="file-name-display">Select file</span>
        <input type="file" id="file-input" style="display:none" />
      </label>
      <div class="modal-actions">
        <button id="send-btn" class="btn-primary" disabled>Send</button>
        <button id="cancel-btn" class="btn-ghost">Cancel</button>
      </div>
      <div id="progress-wrap" class="progress-wrap hidden">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <span id="progress-label">0%</span>
      </div>
    </div>
  </div>

  <!-- Receive toast -->
  <div id="receive-toast" class="receive-toast hidden">
    <div class="toast-inner">
      <div class="toast-title" id="toast-title">Incoming file</div>
      <div class="toast-file" id="toast-file">file.zip</div>
      <div class="toast-actions">
        <button id="accept-btn" class="btn-primary">Accept</button>
        <button id="decline-btn" class="btn-ghost">Decline</button>
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
